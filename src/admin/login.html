<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AlertaWTS — Iniciar Sesion</title>
  <link rel="stylesheet" href="plugins/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="adminlte/css/adminlte.min.css">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body class="hold-transition login-page">

<div class="login-box">
  <div class="login-logo">
    <a href="#"><b>Alerta</b>WTS</a>
  </div>
  <div class="card">
    <div class="card-body login-card-body login-box-body">
      <p class="login-box-msg" style="color:#8ba3c7">Panel Administrativo</p>
      <form id="formLogin">
        <div class="input-group mb-3">
          <input type="email" id="email" class="form-control" placeholder="Correo electronico" required>
          <div class="input-group-append">
            <div class="input-group-text" style="background:#0d1526;border-color:rgba(0,212,255,.15)">
              <span class="fas fa-envelope" style="color:#8ba3c7"></span>
            </div>
          </div>
        </div>
        <div class="input-group mb-3">
          <input type="password" id="clave" class="form-control" placeholder="Contrasena" required>
          <div class="input-group-append">
            <div class="input-group-text" style="background:#0d1526;border-color:rgba(0,212,255,.15)">
              <span class="fas fa-lock" style="color:#8ba3c7"></span>
            </div>
          </div>
        </div>
        <div id="errLogin" class="alert alert-danger" style="display:none"></div>
        <div class="row">
          <div class="col-12">
            <button type="submit" class="btn btn-primary btn-block" id="btnLogin">
              <span id="btnTxt">Ingresar</span>
              <span id="btnSpin" class="spinner-border spinner-border-sm ml-2" style="display:none"></span>
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="plugins/jquery/jquery.min.js"></script>
<script src="plugins/popper/popper.min.js"></script>
<script src="plugins/bootstrap/js/bootstrap.min.js"></script>
<script src="assets/js/config.js"></script>
<script>
  if (localStorage.getItem('wts_token')) {
    window.location.href = 'index.html'
  }

  document.getElementById('formLogin').addEventListener('submit', async (e) => {
    e.preventDefault()
    const btn  = document.getElementById('btnLogin')
    const spin = document.getElementById('btnSpin')
    const err  = document.getElementById('errLogin')
    btn.disabled = true
    spin.style.display = 'inline-block'
    err.style.display  = 'none'
    try {
      const resp = await fetch(CONFIG.BASE_URL + '/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          email: document.getElementById('email').value,
          clave: document.getElementById('clave').value,
        }),
      })
      const data = await resp.json()
      if (!data.ok) throw new Error(data.error)
      localStorage.setItem('wts_token', data.token)
      localStorage.setItem('wts_user',  JSON.stringify(data.usuario))
      window.location.href = 'index.html'
    } catch (ex) {
      err.textContent    = ex.message
      err.style.display  = 'block'
      btn.disabled       = false
      spin.style.display = 'none'
    }
  })
</script>
</body>
</html>
